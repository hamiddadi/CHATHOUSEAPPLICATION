// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    // SDK / toolchain versions. Previously supplied by the `expo-root-project`
    // plugin (rootProject.ext.*); defined explicitly here after the de-Expo
    // migration. Mirror gradle.properties (android.* keys) and React Native
    // 0.83's version catalog (AGP 8.12.0 / Kotlin 2.1.20).
    buildToolsVersion = "36.0.0"
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
    ndkVersion = "27.1.12297006"
    kotlinVersion = "2.1.20"
  }
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    // FCM (de-Expo push): processes android/app/google-services.json so
    // @react-native-firebase can initialise the default Firebase app.
    classpath('com.google.gms:google-services:4.4.2')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "com.facebook.react.rootproject"

// Force every native-module subproject onto the project's installed NDK
// (rootProject.ext.ndkVersion = 27.1.12297006). Some libraries — notably
// react-native-audio-recorder-player — don't set ndkVersion and otherwise fall
// back to AGP's default NDK (27.0.12077973), which is not installed here,
// failing C++ configuration. (de-Expo migration.)
subprojects { subproject ->
  ["com.android.library", "com.android.application"].each { pluginId ->
    subproject.plugins.withId(pluginId) {
      subproject.android {
        ndkVersion = rootProject.ext.has('ndkVersion') ? rootProject.ext.ndkVersion : '27.1.12297006'
      }
    }
  }
}
