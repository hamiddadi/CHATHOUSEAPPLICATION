// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Force every native-module subproject onto the project's installed NDK
// (rootProject.ext.ndkVersion = 27.1.12297006). Some libraries — notably
// react-native-audio-recorder-player / react-native-nitro-modules — don't set
// ndkVersion and otherwise fall back to AGP's default NDK (27.0.12077973), which
// is not installed here, failing C++ configuration. (de-Expo migration.)
subprojects { subproject ->
  ["com.android.library", "com.android.application"].each { pluginId ->
    subproject.plugins.withId(pluginId) {
      subproject.android {
        ndkVersion = rootProject.ext.has('ndkVersion') ? rootProject.ext.ndkVersion : '27.1.12297006'
      }
    }
  }
}
