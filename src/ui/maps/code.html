<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-emerald {
            box-shadow: 0 0 0 0 rgba(0, 228, 117, 0.7);
            animation: pulse-emerald-effect 2s infinite;
        }
        @keyframes pulse-emerald-effect {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 228, 117, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 228, 117, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 228, 117, 0); }
        }
        .pulse-blue {
            animation: pulse-blue-effect 2s infinite;
        }
        @keyframes pulse-blue-effect {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .map-bg {
            background-color: #070b28;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(41, 121, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface selection:bg-primary/30 overflow-hidden">
<!-- TopAppBar -->
<header class="bg-slate-950/40 backdrop-blur-xl text-[#b0c6ff] font-manrope font-bold text-lg tracking-tight docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-2xl" data-icon="graphic_eq">graphic_eq</span>
<span class="text-2xl font-black text-[#b0c6ff] tracking-tighter">Chathouse</span>
</div>
<button class="bg-primary/10 px-4 py-1.5 rounded-full text-sm font-bold border border-primary/20 hover:opacity-80 transition-opacity active:scale-95 duration-150 ease-out">
                Wave 👋
            </button>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative h-[calc(100vh-64px)] w-full overflow-hidden map-bg">
<!-- Mock Map Background -->
<img alt="Dark navy minimalist map" class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="top-down minimalist dark mode map ui with deep navy background and subtle glowing blue street lines and futuristic digital aesthetic" data-location="London" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8AcbO6iJEqE6iGZgews1s0rrCKvDVs24na53Dm9mzljf37x1I8GQtEl7g1Lv9ag-M72fd2ZupjCIMawRNy2As8UaX4OqgENq0Mnyj5C13gKYqKj2yrxNnb-avbKi2yvUZ-rrh7KP8u-GdoSu4K-spThqXfVxGxaM4jCAJICYpR9iTcubmheu5Cqltuig8SqPho25QF4PMrqn095dI9EZOruIHXtM3XS_gWmVJu3iykGyjAcAWKLbDq4_nNKd8fP4KZkOODtjTpG6R"/>
<!-- Search Bar Pin -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-40">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="search">search</span>
<input class="w-full bg-white/5 backdrop-blur-xl border border-white/10 rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary/40 focus:bg-white/10 transition-all shadow-2xl" placeholder="Find a friend..." type="text"/>
</div>
</div>
<!-- Current User Location (Pulsing Dot) -->
<div class="absolute top-[60%] left-[45%] -translate-x-1/2 -translate-y-1/2 z-30">
<div class="relative flex items-center justify-center">
<div class="absolute w-8 h-8 bg-primary/40 rounded-full pulse-blue"></div>
<div class="w-4 h-4 bg-primary rounded-full border-2 border-white shadow-[0_0_15px_rgba(41,121,255,0.6)]"></div>
</div>
</div>
<!-- Follower Pins -->
<!-- Pin 1: Live Badge -->
<div class="absolute top-[30%] left-[20%] z-30 cursor-pointer hover:scale-110 transition-transform">
<div class="relative">
<div class="w-11 h-11 rounded-xl p-0.5 bg-tertiary pulse-emerald">
<img alt="User Avatar" class="w-full h-full rounded-[10px] object-cover" data-alt="portrait of a smiling young woman with neon cyan lighting and cyberpunk aesthetic on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzXcfRHGui1iWgurSUnXYxLi18080gED73yB5Ma2W7z_lv-opxYnLDj_XuOeKloo-_vRRmJ39fhejLW-tEe_huEU6Aik9u5rG_hqPN-JjGUfTiegFLM3qDfDz4TbivRt_iCI2ChgCNBHVCfnieVqbJleDnV7oiPsbChAVUILwOCmRogBNay67H7eUOFcMHJMPez9Qt5aJXdXRzg6L90mEWGR-160flaHRuBQL_8FyrJHdu6gUSdSP-oNw_qg2LKso8FiWC9WHBx00i"/>
</div>
<div class="absolute -top-2 -right-2 bg-tertiary text-on-tertiary-fixed text-[10px] font-black px-1.5 py-0.5 rounded-full uppercase tracking-widest shadow-lg">
                    Live
                </div>
</div>
</div>
<!-- Pin 2: Blue Mic (In a room) -->
<div class="absolute top-[45%] left-[75%] z-30 cursor-pointer hover:scale-110 transition-transform">
<div class="relative">
<div class="w-11 h-11 rounded-xl p-0.5 bg-primary">
<img alt="User Avatar" class="w-full h-full rounded-[10px] object-cover" data-alt="close-up portrait of a man with glasses under deep blue ambient light and tech professional aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnyx5AJ9yEoHdOgDAqlFzEJUy47G9Btz-rHNOIALHgPKwcZzSXKbf1IKzty6W7tTQAoxyj2kB9w-Yild-Lq7TwYcBDF6GH8Xw6oUdFvXnX7bodGs2gp8AFx1z3Y-Muevc-kz8L5U1DQPFrJm_IJKq0kXCSMNuX9Lh2qKj_2xJxCcjKuK-Sadago-ilBnw9hRE-ZNOwfzczMtXlEECw1DoWDaAw2EY6D3rUj-H9F4BodeQ1HY-u7-WS2FzGGHbq_aSfXRT7gUJJZsgv"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-primary w-6 h-6 rounded-full flex items-center justify-center border-2 border-background shadow-xl">
<span class="material-symbols-outlined text-[14px] text-on-primary-container" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
</div>
<!-- Pin 3: Recently Active (Gray) -->
<div class="absolute top-[75%] left-[60%] z-30 cursor-pointer opacity-80 hover:opacity-100 hover:scale-110 transition-transform">
<div class="relative">
<div class="w-11 h-11 rounded-xl p-0.5 bg-outline-variant">
<img alt="User Avatar" class="w-full h-full rounded-[10px] object-cover grayscale" data-alt="artistic portrait of a woman in shadowy warm lighting with minimalist aesthetic and grainy texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6g1Nub5Ojjs241O4p9MJAreBpy11V2fZ22err2FfbwhIO4YNECVfQZSp4xaykZMj8NT_yvv7fJ30giSkRO6AgcyQel7OtzUX4yRenULjsiMewKiUm7pziRaacrPjTHihPn7Jnb-S6KIKMPr7W_PoOFf-P7ZW9opKNZnJLteW3W-7Tkzt1CinFz9_hp-d3PHC0QDNgBMJ5LuM0BErgVilZrQ7o7NBg0WFVDNU5QrfiUK1PydWRm9Ej1c8HTKF4Wm9n_jXg16UapSGt"/>
</div>
<div class="absolute -bottom-5 left-1/2 -translate-x-1/2 whitespace-nowrap text-[10px] font-bold text-on-surface-variant bg-surface-container-low px-2 py-0.5 rounded-full">
                    24m ago
                </div>
</div>
</div>
<!-- Ghost Mode Toggle -->
<div class="absolute bottom-32 left-6 z-40">
<button class="flex items-center gap-3 bg-surface-container-highest/80 backdrop-blur-2xl border border-white/10 rounded-full px-5 py-3 shadow-[0_10px_40px_rgba(0,0,0,0.5)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="ghost">mist</span>
<span class="text-sm font-bold text-on-surface tracking-wide uppercase">Ghost Mode OFF</span>
<div class="w-10 h-5 bg-outline-variant rounded-full relative">
<div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full"></div>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 right-0 z-50 flex justify-around items-center px-4 h-16 bg-[#070b28]/80 backdrop-blur-2xl rounded-[2rem] border border-white/10 w-[90%] max-w-md mx-auto shadow-[0_0_30px_rgba(41,121,255,0.08)]">
<!-- Tab 1: Home/Mic -->
<a class="flex items-center justify-center text-slate-500 hover:text-[#b0c6ff]/80 font-manrope text-[12px] font-semibold transition-all" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="mic">mic</span>
</a>
<!-- Tab 2: Map (ACTIVE) -->
<a class="flex items-center justify-center text-[#b0c6ff] drop-shadow-[0_0_8px_rgba(176,198,255,0.8)] font-manrope text-[12px] font-semibold scale-110 transition-transform duration-300" href="#">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<div class="w-1 h-1 bg-primary rounded-full mt-1"></div>
</div>
</a>
<!-- Tab 3: Chat -->
<a class="flex items-center justify-center text-slate-500 hover:text-[#b0c6ff]/80 font-manrope text-[12px] font-semibold transition-all" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="chat_bubble">chat_bubble</span>
</a>
<!-- Tab 4: Settings -->
<a class="flex items-center justify-center text-slate-500 hover:text-[#b0c6ff]/80 font-manrope text-[12px] font-semibold transition-all" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
</a>
</nav>
</body></html>
