# Prometheus alerting rules for the Chathouse API.
#
# Metric sources:
#   - chathouse_*                      -> prom-client in src/monitoring/metrics.ts
#   - chathouse_process_resident_memory_bytes / chathouse_nodejs_heap_size_used_bytes
#                                      -> collectDefaultMetrics({ prefix: 'chathouse_' })
#   - node_*                           -> node-exporter (host metrics)
#   - up{job=...}                      -> Prometheus target health

groups:
  - name: chathouse-api
    rules:
      # The API target is unreachable (process down, crashed, or network cut).
      - alert: APIDown
        expr: up{job="chathouse-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: chathouse-api
        annotations:
          summary: 'Chathouse API is down'
          description: 'Prometheus has been unable to scrape the chathouse-api target for over 1 minute. The API process may be crashed or unreachable.'

      # 95th-percentile request latency exceeds 2s for a sustained period.
      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(chathouse_http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: chathouse-api
        annotations:
          summary: 'High API latency (p95 > 2s)'
          description: 'The 95th-percentile HTTP request latency has been above 2s for 5 minutes (current value {{ printf "%.2f" $value }}s).'

      # More than 5% of responses are 5xx over the last 5 minutes.
      - alert: High5xxRate
        expr: |
          (
            sum(rate(chathouse_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(chathouse_http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: chathouse-api
        annotations:
          summary: 'Elevated 5xx error rate (> 5%)'
          description: 'More than 5% of HTTP responses have been 5xx over the last 5 minutes (current ratio {{ printf "%.2f" $value }}). Check application logs and Sentry.'

      # Database connection pool is near exhaustion.
      # NOTE: this relies on a custom gauge `chathouse_db_pool_connections`
      # (exported as dbPoolConnectionsGauge in metrics.ts). Populate it from a
      # periodic collector that reads Prisma/PG pool stats and emits the
      # {state="active"} and {state="max"} series. If you do not export pool
      # stats yet, this alert simply never fires (no data) — it is safe to keep.
      - alert: DBPoolSaturated
        expr: |
          (
            chathouse_db_pool_connections{state="active"}
            /
            chathouse_db_pool_connections{state="max"}
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: chathouse-api
        annotations:
          summary: 'Database connection pool > 80% utilised'
          description: 'Active DB connections have exceeded 80% of the pool maximum for 5 minutes (current {{ printf "%.0f" $value }}%). Requests may start queuing on the pool.'

      # Node.js process memory is high. Uses the default-metric resident set
      # size; falls back conceptually to nodejs_heap_size_used_bytes. 512MB
      # threshold — tune to your container memory limit.
      - alert: NodeMemoryHigh
        expr: |
          (
            chathouse_process_resident_memory_bytes
            or
            chathouse_nodejs_heap_size_used_bytes
          ) > 536870912
        for: 5m
        labels:
          severity: warning
          service: chathouse-api
        annotations:
          summary: 'API process memory above 512MB'
          description: 'The Node.js process resident memory has exceeded 512MB for 5 minutes (current {{ printf "%.0f" $value | humanize1024 }}B). Investigate for leaks or raise the container memory limit.'

  - name: host
    rules:
      # Host filesystem usage above 85% (root or any mounted, non-tmpfs FS).
      - alert: DiskUsageHigh
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
              /
              node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
            )
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          service: node-exporter
        annotations:
          summary: 'Disk usage above 85%'
          description: 'Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is over 85% full (current {{ printf "%.1f" (mul $value 100) }}%).'
