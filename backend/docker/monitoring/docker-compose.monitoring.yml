# ─────────────────────────────────────────────────────────────────────────
# Chathouse monitoring stack — Prometheus + Grafana + Alertmanager + exporters
#
# This is a SEPARATE compose project from the backend. To let Prometheus scrape
# the API container, it joins the backend's default network as an EXTERNAL
# network (`backend_default`, created by backend/docker-compose.yml whose
# compose project name defaults to the directory "backend"). Prometheus is
# attached to BOTH the local `monitoring` network (for Grafana/Alertmanager
# DNS) and the external `chathouse` network (to reach `api:4000`).
#
# Bring up (run from this docker/monitoring directory):
#   docker compose -f docker-compose.monitoring.yml up -d
# Make sure the backend stack is up first so backend_default exists:
#   (in backend/)  docker compose up -d
#
# FALLBACK — API not on backend_default (e.g. running on the host via npm):
#   1. Comment out the `chathouse` external network block + its attachment on
#      the prometheus service below.
#   2. In prometheus/prometheus.yml set the chathouse-api target to
#      `host.docker.internal:4000` and add to the prometheus service:
#        extra_hosts: ["host.docker.internal:host-gateway"]
#
# Env (set in a sibling .env or your shell):
#   GF_SECURITY_ADMIN_PASSWORD  - Grafana admin password (default: admin)
#   SLACK_WEBHOOK_URL / SMTP_*  - consumed by alertmanager/alertmanager.yml
# ─────────────────────────────────────────────────────────────────────────

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: chathouse-prometheus
    restart: unless-stopped
    user: root
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - monitoring
      # Reach the API container (api:4000) on the backend's default network.
      - chathouse
    depends_on:
      - alertmanager
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: chathouse-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3001:3000'
    networks:
      - monitoring
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    container_name: chathouse-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - '9093:9093'
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: chathouse-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - '9100:9100'
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  # Local network for the monitoring services to talk to each other.
  monitoring:
    driver: bridge
  # The backend's default network, created by backend/docker-compose.yml.
  # Referenced as external so Prometheus can scrape api:4000. Adjust `name`
  # if your compose project name differs (it defaults to the dir "backend").
  chathouse:
    external: true
    name: backend_default
