# Grafana datasource provisioning — auto-configures Prometheus on startup.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # In-compose DNS name of the Prometheus service.
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
