# Minimal single-node LiveKit server config for self-hosting.
# API key/secret come from the LIVEKIT_KEYS env var (see docker-compose.prod.yml),
# so no secrets live in this file. Redis is only needed for MULTI-node LiveKit;
# a single instance does not require it.
#
# For production behind NAT you almost always also need a TURN server — see
# https://docs.livekit.io/home/self-hosting/. LiveKit Cloud avoids all of this.
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
logging:
  level: info
  json: true
