# ─────────────────────────────────────────────────────────────────────────────
# CD — Deploy to Staging
#
# Trigger: every push to `main` (auto), or manual via the Actions tab.
# Flow:   build & push the API image to GHCR  →  SSH-deploy to the staging host
#          →  health-check (retry)  →  auto-rollback on failure  →  Slack notify.
#
# The image is built from CONTEXT ./backend with ./backend/Dockerfile (a
# multi-stage node:20-slim build that compiles mediasoup natively and runs
# `node dist/app.js` under tini, EXPOSE 4000).
#
# Required secrets (see backend/docs/deployment/runbook.md for the full list):
#   GITHUB_TOKEN (auto)  STAGING_HOST  STAGING_USER  STAGING_SSH_KEY
#   SLACK_WEBHOOK_URL
# ─────────────────────────────────────────────────────────────────────────────
name: CD — Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Never run two staging deploys at once; let the in-flight one finish so we
  # don't race two `docker compose up` on the same host.
  group: cd-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # ───────────────────────── Build & push image to GHCR ──────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
      image_latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest
          # GitHub Actions cache keeps the native mediasoup C++ build warm
          # across runs so staging deploys stay fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ───────────────────────── Deploy to staging host ──────────────────────────
  deploy-staging:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: SSH deploy + health-gate + auto-rollback
        uses: appleboy/ssh-action@v1.2.0
        env:
          NEW_IMAGE: ${{ needs.build-and-push.outputs.image_sha }}
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: NEW_IMAGE,REGISTRY,REGISTRY_USER,REGISTRY_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            log() { printf '%s [deploy] %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$*"; }

            # The deploy dir holds docker-compose.yml + .env for the API stack.
            DEPLOY_DIR="${DEPLOY_DIR:-/opt/chathouse/backend}"
            cd "$DEPLOY_DIR"

            log "Logging in to ${REGISTRY}"
            echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin

            # Record the currently-running image so we can roll back to it.
            PREV_IMAGE="$(docker inspect --format '{{.Config.Image}}' chathouse-api 2>/dev/null || echo '')"
            log "Previous image: ${PREV_IMAGE:-<none>}"
            log "New image:      ${NEW_IMAGE}"

            log "Pulling ${NEW_IMAGE}"
            docker pull "$NEW_IMAGE"

            # Point compose at the freshly-built tag and recreate only the api
            # service (DB/Redis stay up).
            export CHATHOUSE_API_IMAGE="$NEW_IMAGE"
            log "Recreating api service"
            docker compose up -d --no-deps --pull always api || \
              docker compose up -d --no-deps api

            # ── Health gate: poll /health up to 10×, 5s apart ──
            HEALTH_URL="${HEALTH_URL:-http://localhost:4000/health}"
            ok=0
            for i in $(seq 1 10); do
              code="$(curl -fsS -o /tmp/health.json -w '%{http_code}' "$HEALTH_URL" || echo 000)"
              if [ "$code" = "200" ] && grep -q '"database":true' /tmp/health.json && grep -q '"redis":true' /tmp/health.json; then
                log "Health OK on attempt ${i}"
                ok=1
                break
              fi
              log "Health attempt ${i}/10 failed (http=${code}); retrying in 5s"
              sleep 5
            done

            if [ "$ok" -ne 1 ]; then
              log "Health checks FAILED — rolling back"
              if [ -n "$PREV_IMAGE" ]; then
                export CHATHOUSE_API_IMAGE="$PREV_IMAGE"
                docker pull "$PREV_IMAGE" || true
                docker compose up -d --no-deps api
                log "Rolled back to ${PREV_IMAGE}"
              else
                log "No previous image recorded — cannot auto-rollback"
              fi
              exit 1
            fi

            log "Deploy succeeded: ${NEW_IMAGE}"
            # Prune dangling images to keep the host disk in check.
            docker image prune -f >/dev/null 2>&1 || true

  # ───────────────────────── Slack notification ──────────────────────────────
  notify:
    name: Notify Slack
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Compose message
        id: msg
        run: |
          if [ "${{ needs.deploy-staging.result }}" = "success" ]; then
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "text=Staging deploy SUCCEEDED" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "text=Staging deploy FAILED (result=${{ needs.deploy-staging.result }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<JSON
          {
            "text": "${{ steps.msg.outputs.emoji }} *${{ steps.msg.outputs.text }}*\n• repo: ${{ github.repository }}\n• sha: \`${{ github.sha }}\`\n• actor: ${{ github.actor }}\n• run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL"
